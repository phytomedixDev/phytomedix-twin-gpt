<!DOCTYPE html>
<html>
<head>
  <title>Phytomedix-Excell Nutrients Twin Test</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 40px;
      text-align: center;
    }
    input, select {
      padding: 10px;
      margin: 5px;
      width: 200px;
    }
    button {
      padding: 12px 20px;
      margin-top: 15px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }
    #result {
      margin-top: 30px;
      background: white;
      padding: 20px;
      display: inline-block;
      text-align: left;
    }
  </style>
</head>

<body>

<h2>🧬 Phytomedix Digital Twin</h2>

<!-- ====== INTAKE ====== -->

<h3>Initial Twin Assessment</h3>

<input id="email" placeholder="Email"><br>
<input id="age" placeholder="Age"><br>

<select id="smoking">
  <option>Never</option>
  <option>Former</option>
  <option>Current</option>
</select><br>

<input id="sleep" placeholder="Sleep hours"><br>
<input id="height" placeholder="Height (cm)"><br>
<input id="weight" placeholder="Weight (kg)"><br>
<input id="bp" placeholder="BP Systolic"><br>
<input id="glucose" placeholder="Glucose"><br>

<button onclick="runTwin()">Run Twin</button>

<hr><br>

<!-- ====== MICRO CHECKIN ====== -->

<h3>🔁 Daily Micro Check-In</h3>

<input id="checkin_email" placeholder="Email"><br>
<input id="adherence" placeholder="Adherence (1-100)"><br>
<input id="energy" placeholder="Energy (1-10)"><br>
<input id="stress" placeholder="Stress (1-10)"><br>
<input id="sleepq" placeholder="Sleep Quality (1-10)"><br>

<button onclick="runCheckin()">Update My Twin</button>

<br><br>

<div id="result"></div>

<!-- ================= SCRIPT ================= -->

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbw6Oqo22yfc3Hpnx7W3lvrOJ2SNL3VYm9Mgd1UrlZKTdASN_OnAw2QSBO8QXOBe_8X-fg/exec";


// ================= RUN TWIN =================
function runTwin() {

  document.getElementById("result").innerHTML = "Running Twin...";

  const payload = {
    email: document.getElementById("email").value,
    "Q-001": document.getElementById("age").value,
    "Q-003": document.getElementById("smoking").value,
    "Q-006": document.getElementById("sleep").value,
    "Q-019": document.getElementById("height").value,
    "Q-021": document.getElementById("weight").value,
    "Q-020": document.getElementById("bp").value,
    "Q-022": document.getElementById("glucose").value,
    "Q-030": 6,
    "Q-031": 7,
    "Q-032": 5
  };

  const query = encodeURIComponent(JSON.stringify(payload));

  const script = document.createElement("script");
  script.src = API_URL + "?callback=handleTwinResponse&payload=" + query;

  document.body.appendChild(script);
}

function handleTwinResponse(response) {

  if(response.status !== "success"){
    document.getElementById("result").innerHTML =
      "<b>Error:</b> " + response.message;
    return;
  }

  const data = response.output;

  document.getElementById("result").innerHTML =
    "<h3>🧬 Twin Output</h3>" +
    "<b>Functional Score:</b> " + data.overallScore + "<br>" +
    "<b>Biological Age:</b> " + data.biologicalAge + "<br>" +
    "<b>Momentum:</b> " + data.momentum + "<br>" +
    "<b>Strain Index:</b> " + data.strainIndex + "<br>" +
    "<b>Recovery Capacity:</b> " + data.recoveryCapacity;
}


// ================= MICRO CHECKIN =================
function runCheckin() {

  document.getElementById("result").innerHTML = "Updating Twin...";

  const payload = {
    action: "checkin",
    email: document.getElementById("checkin_email").value,
    adherence: document.getElementById("adherence").value,
    energy: document.getElementById("energy").value,
    stress: document.getElementById("stress").value,
    sleep_quality: document.getElementById("sleepq").value
  };

  const query = encodeURIComponent(JSON.stringify(payload));

  const script = document.createElement("script");
  script.src = API_URL + "?callback=handleCheckinResponse&payload=" + query;

  document.body.appendChild(script);
}

function handleCheckinResponse(response){

  if(response.status !== "success"){
    document.getElementById("result").innerHTML =
      "<b>Error:</b> " + response.message;
    return;
  }

  document.getElementById("result").innerHTML =
    "<h3>✅ Twin Updated</h3>" +
    "Adherence: " + response.output.adherence + "<br>" +
    "Energy: " + response.output.energy + "<br>" +
    "Stress: " + response.output.stress + "<br>" +
    "Sleep: " + response.output.sleep;
}

</script>

</body>
</html>
