<!DOCTYPE html>
<html>
<head>
  <title>Phytomedix/ Excell Nutrients Twin Test GPT</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 40px;
      text-align: center;
    }
    input, select {
      padding: 10px;
      margin: 5px;
      width: 200px;
    }
    button {
      padding: 12px 20px;
      margin-top: 15px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }
    #result {
      margin-top: 30px;
      background: white;
      padding: 20px;
      display: inline-block;
      text-align: left;
    }
  </style>
</head>
<body>

<h2>🧬 Phytomedix/Excell Nutrients Digital Twin Test</h2>

<input id="email" placeholder="Email"><br>
<input id="age" placeholder="Age"><br>

<select id="smoking">
  <option>Never</option>
  <option>Former</option>
  <option>Current</option>
</select><br>

<input id="sleep" placeholder="Sleep hours"><br>
<input id="height" placeholder="Height (cm)"><br>
<input id="weight" placeholder="Weight (kg)"><br>
<input id="bp" placeholder="BP Systolic"><br>
<input id="glucose" placeholder="Glucose"><br>

<button onclick="runTwin()">Run Twin</button>

<div id="result"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbw6Oqo22yfc3Hpnx7W3lvrOJ2SNL3VYm9Mgd1UrlZKTdASN_OnAw2QSBO8QXOBe_8X-fg/exec";

function runTwin() {

  const payload = {
    email: document.getElementById("email").value,
    "Q-001": parseInt(document.getElementById("age").value),
    "Q-003": document.getElementById("smoking").value,
    "Q-006": parseFloat(document.getElementById("sleep").value),
    "Q-019": parseFloat(document.getElementById("height").value),
    "Q-021": parseFloat(document.getElementById("weight").value),
    "Q-020": parseFloat(document.getElementById("bp").value),
    "Q-022": parseFloat(document.getElementById("glucose").value),
    "Q-030": 6,
    "Q-031": 7,
    "Q-032": 5
  };

  fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(payload)
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("result").innerHTML =
      "<h3>Twin Output</h3>" +
      "Score: " + data.output.overallScore + "<br>" +
      "Bio Age: " + data.output.biologicalAge + "<br>" +
      "Momentum: " + data.output.momentum + "<br>" +
      "Strain: " + data.output.strainIndex + "<br>" +
      "Recovery: " + data.output.recoveryCapacity;
  });

}

</script>

</body>
</html>
